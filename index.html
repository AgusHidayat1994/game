<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Ular Tangga Modern (Vs BOT)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        #boardCanvas {
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            background: #111827;
        }

        .controls {
            display: flex;
            flex-direction: column;
            width: 250px;
            gap: 15px;
        }

        .status-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .player-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .token-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
        }

        .p1-color { background-color: #ff4757; box-shadow: 0 0 8px #ff4757;}
        .p2-color { background-color: #2ed573; box-shadow: 0 0 8px #2ed573;}

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.3);
        }

        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        #dice-result {
            font-size: 48px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
            animation: pulse 0.5s infinite alternate;
        }

        #log {
            height: 120px;
            overflow-y: auto;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid #334155;
            color: #94a3b8;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <h1>ULAR TANGGA - CYBER EDITION</h1>

    <div class="game-container">
        <canvas id="boardCanvas" width="500" height="500"></canvas>

        <div class="controls">
            <div class="status-box">
                <div class="player-status">
                    <span class="token-dot p1-color"></span>
                    <span>Kamu (P1): Kotak <span id="p1-pos">0</span></span>
                </div>
                <div class="player-status">
                    <span class="token-dot p2-color"></span>
                    <span>Bot (P2): Kotak <span id="p2-pos">0</span></span>
                </div>
                <hr style="border-color: #334155;">
                <div style="text-align: center; font-size: 14px; color: #94a3b8;">Giliran: <span id="current-turn" style="color:#fff; font-weight:bold;">Pemain 1</span></div>
            </div>

            <div id="dice-result">⚀</div>

            <button id="roll-btn" class="btn">Kocok Dadu</button>
            
            <div id="log">Selamat datang! Silakan kocok dadu untuk memulai.</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const rollBtn = document.getElementById('roll-btn');
        const diceResult = document.getElementById('dice-result');
        const logBox = document.getElementById('log');

        const boardSize = 10;
        const cellSize = canvas.width / boardSize;
