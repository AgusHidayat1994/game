<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Monopoly vs Bot</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
        #board { display: grid; grid-template-columns: repeat(4, 80px); grid-template-rows: repeat(4, 80px); gap: 5px; justify-content: center; margin: 20px auto; }
        .cell { border: 2px solid #333; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; position: relative; }
        .cell .players { position: absolute; bottom: 5px; font-size: 14px; }
        #controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #ccc; }
        #log { width: 320px; height: 150px; margin: 20px auto; background: white; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

    <h1>Mini Monopoly (vs Bot)</h1>
    <div id="status">Giliran Anda!</div>
    
    <!-- Papan Game 4x4 (12 Kotak Keliling) -->
    <div id="board">
        <div class="cell" id="cell-0">START<div class="players" id="p-0">👤🤖</div></div>
        <div class="cell" id="cell-1" style="background:#ffcccb">Jakarta<br>$100<div class="players" id="p-1"></div></div>
        <div class="cell" id="cell-2" style="background:#ffcccb">Bandung<br>$120<div class="players" id="p-2"></div></div>
        <div class="cell" id="cell-3" style="background:#b3e5fc">Surabaya<br>$140<div class="players" id="p-3"></div></div>
        <div class="cell" id="cell-11" style="background:#fff9c4">Medan<br>$240<div class="players" id="p-11"></div></div>
        <div class="cell" style="border:none; background:transparent;"></div>
        <div class="cell" style="border:none; background:transparent;"></div>
        <div class="cell" id="cell-4" style="background:#b3e5fc">Bali<br>$160<div class="players" id="p-4"></div></div>
        <div class="cell" id="cell-10" style="background:#fff9c4">Makassar<br>$220<div class="players" id="p-10"></div></div>
        <div class="cell" style="border:none; background:transparent;"></div>
        <div class="cell" style="border:none; background:transparent;"></div>
        <div class="cell" id="cell-5" style="background:#c8e6c9">Semarang<br>$180<div class="players" id="p-5"></div></div>
        <div class="cell" id="cell-9" style="background:#d1c4e9">Papua<br>$200<div class="players" id="p-9"></div></div>
        <div class="cell" id="cell-8" style="background:#d1c4e9">Jogja<br>$200<div class="players" id="p-8"></div></div>
        <div class="cell" id="cell-7" style="background:#c8e6c9">Lombok<br>$180<div class="players" id="p-7"></div></div>
        <div class="cell" id="cell-6" style="background:#ffcc80">PENJARA<div class="players" id="p-6"></div></div>
    </div>

    <div id="controls">
        <button id="roll-btn" onclick="playTurn()">Kocok Dadu</button>
    </div>

    <h3>Log Permainan</h3>
    <div id="log"></div>

    <script>
        // Data Kotak Papan
        const boardData = [
            { name: "START", price: 0, type: "special" },
            { name: "Jakarta", price: 100, type: "property", owner: null },
            { name: "Bandung", price: 120, type: "property", owner: null },
            { name: "Surabaya", price: 140, type: "property", owner: null },
            { name: "Bali", price: 160, type: "property", owner: null },
            { name: "Semarang", price: 180, type: "property", owner: null },
            { name: "PENJARA", price: 0, type: "special" },
            { name: "Lombok", price: 180, type: "property", owner: null },
            { name: "Jogja", price: 200, type: "property", owner: null },
            { name: "Papua", price: 200, type: "property", owner: null },
            { name: "Makassar", price: 220, type: "property", owner: null },
            { name: "Medan", price: 240, type: "property", owner: null }
        ];

        // Status Pemain
        const players = [
            { id: 0, name: "Anda (👤)", money: 1000, pos: 0, icon: "👤", isBot: false },
            { id: 1, name: "Bot (🤖)", money: 1000, pos: 0, icon: "🤖", isBot: true }
        ];

        let turn = 0; // 0 = User, 1 = Bot

        function writeLog(msg) {
            const logDiv = document.getElementById("log");
            logDiv.innerHTML += msg + "<br>";
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateBoard() {
            // Bersihkan semua ikon pemain di papan
            for (let i = 0; i < 12; i++) {
                document.getElementById(`p-${i}`).innerText = "";
            }
            // Taruh pemain di posisi baru
            players.forEach(p => {
                document.getElementById(`p-${p.pos}`).innerText += p.icon;
            });
            // Update teks status uang
            document.getElementById("status").innerHTML = 
                `GIRAN: <b>${players[turn].name}</b><br>
                 Uang Anda: $${players[0].money} | Uang Bot: $${players[1].money}`;
        }

        function playTurn() {
            if (players[turn].isBot) return; // Mencegah klik saat giliran Bot

            document.getElementById("roll-btn").disabled = true;
            movePlayer(players[0]);
        }

        function movePlayer(player) {
            const dice = Math.floor(Math.random() * 6) + 1;
            player.pos = (player.pos + dice) % 12;
            writeLog(`🎲 ${player.name} mengocok dadu: <b>${dice}</b>. Tiba di ${boardData[player.pos].name}.`);
            
            handleCell(player);
            updateBoard();

            // Cek kondisi kalah
            if (player.money <= 0) {
                writeLog(`🚨 <b>${player.name} BANGKRUT! Game Selesai.</b>`);
                return;
            }

            // Ganti Giliran
            turn = turn === 0 ? 1 : 0;
            
            if (players[turn].isBot) {
                setTimeout(botTurn, 1500); // Bot jalan otomatis setelah 1.5 detik
            } else {
                document.getElementById("roll-btn").disabled = false;
            }
        }

        function handleCell(player) {
            const cell = boardData[player.pos];

            if (cell.type === "property") {
                if (cell.owner === null) {
                    // Jika belum ada pemilik
                    if (!player.isBot) {
                        // Logika untuk Player (Konfirmasi Beli)
                        if (player.money >= cell.price) {
                            if (confirm(`Apakah Anda ingin membeli ${cell.name} seharga $${cell.price}?`)) {
                                buyProperty(player, cell);
                            } else {
                                writeLog(`❌ Anda memilih untuk tidak membeli ${cell.name}.`);
                            }
                        } else {
                            writeLog(`💸 Uang tidak cukup untuk membeli ${cell.name}.`);
                        }
                    } else {
                        // Logika Kecerdasan Buatan (Bot AI)
                        // Aturan Bot: Beli jika uang tersisa setelah beli masih > $200
                        if (player.money - cell.price > 200) {
                            buyProperty(player, cell);
                        } else {
                            writeLog(`🤖 Bot memutuskan menghemat uang, tidak membeli ${cell.name}.`);
                        }
                    }
                } else if (cell.owner !== player.id) {
                    // Jika tanah milik musuh (Bayar Sewa)
                    const rent = Math.floor(cell.price * 0.3); // Sewa 30% dari harga rumah
                    const ownerIndex = cell.owner;
                    player.money -= rent;
                    players[ownerIndex].money += rent;
                    writeLog(`💰 ${player.name} membayar sewa $${rent} kepada ${players[ownerIndex].name}.`);
                }
            } else if (cell.name === "PENJARA") {
                player.money -= 50;
                writeLog(`🔒 ${player.name} masuk penjara! Denda $50.`);
            }
        }

        function buyProperty(player, cell) {
            player.money -= cell.price;
            cell.owner = player.id;
            document.getElementById(`cell-${player.pos}`).style.border = `3px solid ${player.id === 0 ? 'blue' : 'red'}`;
            writeLog(`🏠 ${player.name} sukses membeli <b>${cell.name}</b> seharga $${cell.price}.`);
        }

        function botTurn() {
            movePlayer(players[1]);
        }

        // Jalankan update tampilan pertama kali
        updateBoard();
    </script>
</body>
</html>
