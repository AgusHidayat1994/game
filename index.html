<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Karambol Sederhana (Player vs Bot)</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background-color: #f4d0a4;
            border: 15px solid #8B4513;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.7);
            cursor: pointer;
        }
        #status {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status">Giliran Anda (Tarik Striker lalu Lepaskan)</div>
    <canvas id="carromBoard" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("carromBoard");
const ctx = canvas.getContext("2d");
const statusDiv = document.getElementById("status");

// Konfigurasi Game
const BOARD_SIZE = 500;
const FRICTION = 0.98;
let isYourTurn = true;
let isAiming = false;
let aimStart = { x: 0, y: 0 };

// Struktur Objek Koin/Striker
class Disc {
    constructor(x, y, radius, color, isStriker = false) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.vx = 0;
        this.vy = 0;
        this.isStriker = isStriker;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.closePath();
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= FRICTION;
        this.vy *= FRICTION;

        // Berhenti jika sangat lambat
        if (Math.abs(this.vx) < 0.1) this.vx = 0;
        if (Math.abs(this.vy) < 0.1) this.vy = 0;

        // Pantulan Dinding
        if (this.x - this.radius < 0 || this.x + this.radius > BOARD_SIZE) {
            this.vx *= -1;
            this.x = this.x - this.radius < 0 ? this.radius : BOARD_SIZE - this.radius;
        }
        if (this.y - this.radius < 0 || this.y + this.radius > BOARD_SIZE) {
            this.vy *= -1;
            this.y = this.y - this.radius < 0 ? this.radius : BOARD_SIZE - this.radius;
        }
    }
}

// Lubang Karambol (4 Sudut)
const holes = [
    { x: 25, y: 25 },
    { x: 475, y: 25 },
    { x: 25, y: 475 },
    { x: 475, y: 475 }
];

// Inisialisasi Striker dan Koin
let striker = new Disc(BOARD_SIZE / 2, 400, 20, "#e74c3c", true);
let coins = [];

// Tambah Koin Merah (Ratu) di tengah
coins.push(new Disc(BOARD_SIZE / 2, BOARD_SIZE / 2, 15, "#f1c40f"));
// Tambah beberapa koin putih dan hitam acak di tengah
for (let i = 0; i < 6; i++) {
    let angle = (i * Math.PI) / 3;
    let dist = 35;
    let color = i % 2 === 0 ? "#ffffff" : "#333333";
    coins.push(new Disc(BOARD_SIZE / 2 + Math.cos(angle) * dist, BOARD_SIZE / 2 + Math.sin(angle) * dist, 15, color));
}

// Deteksi Tabrakan Fisika Antar Koin
function handleCollisions() {
    let all = [striker, ...coins];
    for (let i = 0; i < all.length; i++) {
        for (let j = i + 1; j < all.length; j++) {
            let dist = Math.hypot(all[i].x - all[j].x, all[i].y - all[j].y);
            if (dist < all[i].radius + all[j].radius) {
                // Efek pantulan elastis sederhana
                let angle = Math.atan2(all[j].y - all[i].y, all[j].x - all[i].x);
                let speed1 = Math.hypot(all[i].vx, all[i].vy);
                let speed2 = Math.hypot(all[j].vx, all[j].vy);

                all[i].vx = -Math.cos(angle) * (speed1 + 2);
                all[i].vy = -Math.sin(angle) * (speed1 + 2);
                all[j].vx = Math.cos(angle) * (speed2 + 2);
                all[j].vy = Math.sin(angle) * (speed2 + 2);
            }
        }
    }
}

// Cek koin yang masuk lubang
function checkHoles() {
    coins = coins.filter(coin => {
        for (let hole of holes) {
            if (Math.hypot(coin.x - hole.x, coin.y - hole.y) < 30) {
                return false; // Koin dihapus (masuk lubang)
            }
        }
        return true;
    });

    // Jika striker masuk lubang, kembalikan ke posisi awal
    for (let hole of holes) {
        if (Math.hypot(striker.x - hole.x, striker.y - hole.y) < 30) {
            striker.vx = 0; striker.vy = 0;
            striker.x = BOARD_SIZE / 2;
            striker.y = isYourTurn ? 400 : 100;
        }
    }
}

// Cek apakah semua objek sudah berhenti bergerak
function isEverythingStopped() {
    if (striker.vx !== 0 || striker.vy !== 0) return false;
    for (let coin of coins) {
        if (coin.vx !== 0 || coin.vy !== 0) return false;
    }
    return true;
}

// AI Bot Logic
function playBotTurn() {
    statusDiv.innerText = "Giliran Bot sedang membidik...";
    striker.x = BOARD_SIZE / 2;
    striker.y = 100; // Bot menembak dari atas

    setTimeout(() => {
        if (coins.length === 0) return;
        // Bot mengincar koin pertama yang ada di daftar
        let target = coins[0];
        let angle = Math.atan2(target.y - striker.y, target.x - striker.x);
        let power = 15; // Kekuatan tembakan bot

        striker.vx = Math.cos(angle) * power;
        striker.vy = Math.sin(angle) * power;

        isYourTurn = true;
    }, 1500);
}

// Input Kendali Player (Mouse/Touch)
canvas.addEventListener("mousedown", (e) => {
    if (!isYourTurn || !isEverythingStopped()) return;
    const rect = canvas.getBoundingClientRect();
    let mouseX = e.clientX - rect.left;
    let mouseY = e.clientY - rect.top;

    if (Math.hypot(mouseX - striker.x, mouseY - striker.y) < striker.radius + 10) {
        isAiming = true;
        aimStart = { x: mouseX, y: mouseY };
    }
});

canvas.addEventListener("mousemove", (e) => {
    if (!isAiming) return;
    const rect = canvas.getBoundingClientRect();
    aimStart.currentX = e.clientX - rect.left;
    aimStart.currentY = e.clientY - rect.top;
});

canvas.addEventListener("mouseup", (e) => {
    if (!isAiming) return;
    isAiming = false;

    const rect = canvas.getBoundingClientRect();
    let mouseX = e.clientX - rect.left;
    let mouseY = e.clientY - rect.top;

    // Hitung arah dorongan (kebalikan dari tarikan garis)
    let dx = striker.x - mouseX;
    let dy = striker.y - mouseY;
    
    striker.vx = dx * 0.15;
    striker.vy = dy * 0.15;

    isYourTurn = false;
});

// Loop Utama Game
let lastStoppedState = true;

function gameLoop() {
    // Bersihkan Canvas & Gambar Papan
    ctx.clearRect(0, 0, BOARD_SIZE, BOARD_SIZE);
    
    // Gambar Lubang
    ctx.fillStyle = "#333";
    for (let hole of holes) {
        ctx.beginPath();
        ctx.arc(hole.x, hole.y, 25, 0, Math.PI * 2);
        ctx.fill();
    }

    // Update & Gambar Koin
    striker.update();
    striker.draw();
    
    coins.forEach(coin => {
        coin.update();
        coin.draw();
    });

    handleCollisions();
    checkHoles();

    // Gambar garis bidikan jika sedang membidik
    if (isAiming) {
        ctx.beginPath();
        ctx.moveTo(striker.x, striker.y);
        ctx.lineTo(aimStart.currentX, aimStart.currentY);
        ctx.strokeStyle = "red";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    // Mengatur pergantian giliran setelah semua koin berhenti bergerak
    let stopped = isEverythingStopped();
    if (stopped && !lastStoppedState) {
        if (!isYourTurn) {
            playBotTurn();
        } else {
            statusDiv.innerText = "Giliran Anda (Tarik Striker lalu Lepaskan)";
            striker.x = BOARD_SIZE / 2;
            striker.y = 400; // Kembalikan posisi striker player di bawah
        }
    }
    lastStoppedState = stopped;

    requestAnimationFrame(gameLoop);
}

// Jalankan Game
gameLoop();
</script>
</body>
</html>
