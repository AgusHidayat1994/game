<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino Cyber Game vs Bot</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --bot-color: #f43f5e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            margin-bottom: 10px;
        }

        #game-container {
            width: 100%;
            max-width: 900px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }

        /* Area Meja Permainan */
        #board {
            min-height: 150px;
            background: #020617;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            border: 2px dashed #334155;
        }

        /* Desain Kartu Domino */
        .domino-card {
            width: 50px;
            height: 90px;
            background: #ffffff;
            color: #000;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            box-sizing: border-box;
        }

        .player-hand .domino-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .domino-half {
            font-size: 20px;
            font-weight: bold;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .domino-line {
            width: 80%;
            height: 2px;
            background: #334155;
        }

        /* Area Tangan Pemain & Bot */
        .hand-container {
            margin-top: 15px;
        }

        .hand-title {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #94a3b8;
        }

        .hand {
            display: flex;
            gap: 10px;
            min-height: 100px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow-x: auto;
        }

        /* Kartu Bot disembunyikan tampilannya */
        .bot-hand .domino-card {
            background: linear-gradient(135deg, #f43f5e, #be123c);
            color: transparent;
        }
        .bot-hand .domino-line { background: transparent; }

        .btn {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>DOMINO CYBER</h1>
    
    <div id="game-container">
        <div class="status-bar">
            <div id="turn-indicator">Giliran: Pemain</div>
            <button class="btn" id="draw-btn" onclick="drawCard()">Ambil Kartu</button>
        </div>

        <div class="hand-container">
            <div class="hand-title" style="color: var(--bot-color)">Bot Hand (<span id="bot-count">0</span> kartu)</div>
            <div id="bot-hand" class="hand bot-hand"></div>
        </div>

        <div class="hand-container">
            <div class="hand-title">Meja Pertandingan</div>
            <div id="board">--- Meja Kosong ---</div>
        </div>

        <div class="hand-container">
            <div class="hand-title" style="color: var(--accent-color)">Your Hand</div>
            <div id="player-hand" class="hand player-hand"></div>
        </div>
    </div>

    <script>
        let deck = [];
        let playerHand = [];
        let botHand = [];
        let board = []; // Menyimpan deretan kartu di meja [[a,b], [b,c]]
        let isPlayerTurn = true;

        // 1. Inisialisasi Game
        function initGame() {
            deck = [];
            playerHand = [];
            botHand = [];
            board = [];
            
            // Buat kartu domino (0-0 sampai 6-6)
            for (let i = 0; i <= 6; i++) {
                for (let j = i; j <= 6; j++) {
                    deck.push([i, j]);
                }
            }
            // Acak kartu
            deck.sort(() => Math.random() - 0.5);

            // Bagi kartu (masing-masing dapat 7)
            for (let i = 0; i < 7; i++) {
                playerHand.push(deck.pop());
                botHand.push(deck.pop());
            }

            isPlayerTurn = true;
            updateUI();
        }

        // 2. Update Tampilan (UI)
        function updateUI() {
            // Render Meja
            const boardEl = document.getElementById('board');
            if (board.length === 0) {
                boardEl.innerHTML = '--- Meja Kosong (Mainkan kartu mana saja) ---';
            } else {
                boardEl.innerHTML = '';
                board.forEach(card => {
                    boardEl.appendChild(createCardUI(card, false));
                });
            }

            // Render Tangan Pemain
            const playerHandEl = document.getElementById('player-hand');
            playerHandEl.innerHTML = '';
            playerHand.forEach((card, index) => {
                const cardEl = createCardUI(card, true);
                cardEl.onclick = () => playPlayerCard(index);
                playerHandEl.appendChild(cardEl);
            });

            // Render Tangan Bot (Disembunyikan kodenya)
            const botHandEl = document.getElementById('bot-hand');
            botHandEl.innerHTML = '';
            botHand.forEach(() => {
                botHandEl.appendChild(createCardUI([?, ?], false)); 
            });
            document.getElementById('bot-count').innerText = botHand.length;

            // Status giliran
            document.getElementById('turn-indicator').innerText = isPlayerTurn ? "Giliran: Kamu" : "Giliran: Bot...";
            document.getElementById('draw-btn').disabled = deck.length === 0 || !isPlayerTurn;

            checkWinCondition();
        }

        // Fungsi pembantu membuat elemen kartu HTML
        function createCardUI(card, isInteractive) {
            const div = document.createElement('div');
            div.className = 'domino-card';
            div.innerHTML = `
                <div class="domino-half">${card[0] !== undefined ? card[0] : ''}</div>
                <div class="domino-line"></div>
                <div class="domino-half">${card[1] !== undefined ? card[1] : ''}</div>
            `;
            return div;
        }

        // 3. Logika Logis Permainan
        function getOpenEnds() {
            if (board.length === 0) return null;
            return {
                left: board[0][0],
                right: board[board.length - 1][1]
            };
        }

        function checkValidMove(card) {
            const ends = getOpenEnds();
            if (!ends) return 'any'; // Meja kosong, bebas pasang
            
            if (card[0] === ends.left || card[1] === ends.left) return 'left';
            if (card[0] === ends.right || card[1] === ends.right) return 'right';
            return null;
        }
