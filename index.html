<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Game Slot Sederhana</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .status-container {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: #16213e;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }

        .slot-machine {
            background: #0f3460;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 4px solid #e94560;
            text-align: center;
        }

        .reels {
            display: flex;
            gap: 15px;
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .reel {
            width: 80px;
            height: 80px;
            background: #ffffff;
            color: #000000;
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 2px solid #333;
            transition: transform 0.1s ease;
        }

        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #951c32;
            transition: all 0.1s ease;
        }

        button:hover {
            background-color: #ff5274;
        }

        button:active {
            box-shadow: 0 0 #951c32;
            transform: translateY(4px);
        }

        button:disabled {
            background-color: #555;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            height: 25px;
            color: #4ecca3;
        }
    </style>
</head>
<body>

    <h1>🎰 SLOT SIMULATOR 🎰</h1>

    <div class="status-container">
        <div>Saldo: <span id="balance">100</span> Koin</div>
        <div>Taruhan: <span id="bet">10</span> Koin</div>
    </div>

    <div class="slot-machine">
        <div class="reels">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍋</div>
            <div class="reel" id="reel3">🍊</div>
        </div>
        <button id="spin-btn" onclick="spin()">SPIN</button>
        <div class="message" id="msg">Tekan Spin untuk bermain!</div>
    </div>

    <script>
        // Daftar simbol yang digunakan dalam permainan
        const symbols = ['🍒', '🍋', '🍊', '🍇', '🔔', '💎', '7️⃣'];
        
        let balance = 100;
        const betCost = 10;

        const reel1 = document.getElementById('reel1');
        const reel2 = document.getElementById('reel2');
        const reel3 = document.getElementById('reel3');
        const balanceEl = document.getElementById('balance');
        const msgEl = document.getElementById('msg');
        const spinBtn = document.getElementById('spin-btn');

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function spin() {
            // Validasi kecukupan saldo
            if (balance < betCost) {
                msgEl.innerText = "Saldo tidak cukup! Silakan muat ulang halaman.";
                msgEl.style.color = "#ff4a4a";
                return;
            }

            // Kurangi saldo untuk taruhan
            balance -= betCost;
            balanceEl.innerText = balance;
            msgEl.innerText = "Memutar...";
            msgEl.style.color = "#ffffff";
            spinBtn.disabled = true;

            // Efek animasi acak sederhana sebelum berhenti
            let count = 0;
            const interval = setInterval(() => {
                reel1.innerText = getRandomSymbol();
                reel2.innerText = getRandomSymbol();
                reel3.innerText = getRandomSymbol();
                count++;
                
                if (count > 10) {
                    clearInterval(interval);
                    determineResult();
                }
            }, 100);
        }

        function determineResult() {
            // Menentukan hasil akhir putaran
            const res1 = getRandomSymbol();
            const res2 = getRandomSymbol();
            const res3 = getRandomSymbol();

            // Tampilkan hasil akhir ke layar
            reel1.innerText = res1;
            reel2.innerText = res2;
            reel3.innerText = res3;

            // Logika kemenangan
            if (res1 === res2 && res2 === res3) {
                let reward = 0;
                if (res1 === '7️⃣') {
                    reward = 100; // Jackpot Utama
                    msgEl.innerText = `🎉 JACKPOT UTAMA! +${reward} Koin 🎉`;
                } else {
                    reward = 50; // Kemenangan Biasa
                    msgEl.innerText = `🎉 Menang Besar! +${reward} Koin 🎉`;
                }
                balance += reward;
                msgEl.style.color = "#4ecca3";
            } else if (res1 === res2 || res2 === res3 || res1 === res3) {
                const reward = 15; // Kemenangan Kecil (2 simbol sama)
                balance += reward;
                msgEl.innerText = `Cukup Beruntung! Dua sama: +${reward} Koin`;
                msgEl.style.color = "#ffb423";
            } else {
                msgEl.innerText = "Coba lagi! Semoga beruntung.";
                msgEl.style.color = "#ff4a4a";
            }

            // Perbarui sisa saldo di UI dan aktifkan kembali tombol
            balanceEl.innerText = balance;
            spinBtn.disabled = false;

            if (balance < betCost) {
                msgEl.innerText = "Game Over! Saldo Anda habis.";
                spinBtn.disabled = true;
            }
        }
    </script>
</body>
</html>
