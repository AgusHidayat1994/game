<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Game Slot</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
            margin-bottom: 10px;
        }

        .disclaimer {
            font-size: 12px;
            color: #999;
            margin-bottom: 20px;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #16213e;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }

        .stat {
            font-size: 18px;
            font-weight: bold;
        }

        .stat span {
            color: #4ecca3;
        }

        .slot-machine {
            background: radial-gradient(circle, #0f3460, #16213e);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(233, 69, 96, 0.3);
            border: 4px solid #e94560;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reel-container {
            display: flex;
            gap: 15px;
            background-color: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #0f3460;
            margin-bottom: 25px;
        }

        .reel {
            width: 90px;
            height: 90px;
            background-color: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-in-out;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #ff527b;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            height: 24px;
            color: #4ecca3;
        }
    </style>
</head>
<body>

    <h1>🎰 SIMULATOR SLOT VIRTUAL 🎰</h1>
    <div class="disclaimer">Game ini hanya untuk simulasi hiburan. Tidak menggunakan uang asli.</div>

    <div class="dashboard">
        <div class="stat">Saldo: <span id="balance">1000</span> Koin</div>
        <div class="stat">Taruhan: <span id="bet">50</span> Koin</div>
    </div>

    <div class="slot-machine">
        <div class="reel-container">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍋</div>
            <div class="reel" id="reel3">💎</div>
        </div>

        <div class="controls">
            <button id="spin-btn" onclick="spin()">PUTAR!</button>
        </div>

        <div class="message" id="message">Silakan klik putar untuk memulai!</div>
    </div>

    <script>
        // Daftar simbol yang digunakan dalam permainan
        const symbols = ['🍒', '🍋', '🍊', '🍇', '🔔', '💎', '7️⃣'];
        
        let balance = 1000;
        const betCost = 50;

        const reel1 = document.getElementById('reel1');
        const reel2 = document.getElementById('reel2');
        const reel3 = document.getElementById('reel3');
        const spinBtn = document.getElementById('spin-btn');
        const balanceDisplay = document.getElementById('balance');
        const messageDisplay = document.getElementById('message');

        function getRandomSymbol() {
            const randomIndex = Math.floor(Math.random() * symbols.length);
            return symbols[randomIndex];
        }

        function spin() {
            // Validasi kecukupan saldo virtual
            if (balance < betCost) {
                messageDisplay.style.color = '#e94560';
                messageDisplay.innerText = "Saldo virtual habis! Muat ulang halaman untuk reset.";
                return;
            }

            // Kurangi saldo virtual sesuai taruhan
            balance -= betCost;
            balanceDisplay.innerText = balance;
            
            // Nonaktifkan tombol saat berputar agar tidak bisa di-spam
            spinBtn.disabled = true;
            messageDisplay.innerText = "Memutar gulungan...";
            messageDisplay.style.color = '#ffffff';

            let count = 0;
            // Efek animasi acak sebelum berhenti
            const interval = setInterval(() => {
                reel1.innerText = getRandomSymbol();
                reel2.innerText = getRandomSymbol();
                reel3.innerText = getRandomSymbol();
                count++;
                
                // Hentikan putaran setelah beberapa kali kocokan acak
                if (count > 15) {
                    clearInterval(interval);
                    determineResult();
                }
            }, 100);
        }

        function determineResult() {
            const res1 = reel1.innerText;
            const res2 = reel2.innerText;
            const res3 = reel3.innerText;

            spinBtn.disabled = false;

            // Logika penentuan kemenangan simulasi
            if (res1 === res2 && res2 === res3) {
                let winAmount = 0;
                
                // Hadiah ekstra untuk simbol utama 7️⃣ atau 💎
                if (res1 === '7️⃣' || res1 === '💎') {
                    winAmount = betCost * 10; // Menang besar (Jackpot)
                    messageDisplay.style.color = '#ffcc00';
                    messageDisplay.innerText = `🎉 JACKPOT UTAMA! Anda menang ${winAmount} koin virtual!`;
                } else {
                    winAmount = betCost * 5; // Menang reguler
                    messageDisplay.style.color = '#4ecca3';
                    messageDisplay.innerText = `🎉 Menang Kembar 3! Anda dapat ${winAmount} koin virtual!`;
                }
                
                balance += winAmount;
            } else if (res1 === res2 || res1 === res3 || res2 === res3) {
                // Menang kecil jika ada 2 simbol yang sama
                const winAmount = betCost * 1.5;
                balance += winAmount;
                messageDisplay.style.color = '#4ecca3';
                messageDisplay.innerText = `🙂 Lumayan! Kembar 2 dapat ${winAmount} koin virtual.`;
            } else {
                messageDisplay.style.color = '#e94560';
                messageDisplay.innerText = "Coba lagi! Semoga beruntung di putaran berikutnya.";
            }

            // Perbarui tampilan saldo setelah hasil keluar
            balanceDisplay.innerText = balance;
        }
    </script>
</body>
</html>
