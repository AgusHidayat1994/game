<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Catur Keren</title>
    <!-- Memuat pustaka CSS dan JS dari CDN untuk tampilan dan aturan catur -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://jquery.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2b2b2b;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; }
        #board { width: 400px; margin-bottom: 20px; }
        .info {
            background: #444;
            padding: 15px;
            border-radius: 8px;
            width: 370px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Game Catur Online</h1>
    <div id="board"></div>
    
    <div class="info">
        <p><strong>Status:</strong> <span id="game-status">Giliran Putih</span></p>
        <p><strong>Riwayat Langkah:</strong> <span id="history">Tidak ada</span></p>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var statusEl = $('#game-status');
        var historyEl = $('#history');

        // Fungsi saat bidak diangkat
        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;
            // Hanya bidak putih yang boleh jalan jika giliran putih
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        // Fungsi saat bidak dilepas
        function onDrop(source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Otomatis promosi ke ratu
            });

            if (move === null) return 'snapback';

            updateStatus();
        }

        // Fungsi merapikan papan setelah bidak jalan
        function onSnapEnd() {
            board.position(game.fen());
        }

        // Memperbarui status permainan dan giliran
        function updateStatus() {
            var status = '';
            var moveColor = game.turn() === 'w' ? 'Putih' : 'Hitam';

            if (game.in_checkmate()) {
                status = 'Kalah! ' + moveColor + ' Skakmat.';
            } else if (game.in_draw()) {
                status = 'Seri!';
            } else {
                status = 'Giliran ' + moveColor;
                if (game.in_check()) {
                    status += ', ' + moveColor + ' dalam kondisi SKAK!';
                }
            }

            statusEl.html(status);
            historyEl.html(game.history().join(', '));
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        
        board = ChessBoard('board', config);
        updateStatus();
    </script>
</body>
</html>
