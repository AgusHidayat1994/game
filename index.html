<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Catur Developer mr. Agus Hidayat</title>
    <!-- Mengambil css untuk papan catur -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #2f3542;
            color: white;
            margin: 0;
            height: 100vh;
        }
        h1 { margin-bottom: 10px; }
        #myBoard { width: 400px; max-width: 90vw; margin: 20px auto; }
        #status { font-size: 1.2rem; font-weight: bold; margin-top: 10px; }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #1e90ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background-color: #3742fa; }
    </style>
</head>
<body>

    <h1>developer Agus Hidayat</h1>
    <div id="myBoard"></div>
    <div id="status">Giliran Anda (Putih)</div>
    <button onclick="resetGame()">Mulai Ulang</button>

    <!-- Mengimpor jQuery, Chess.js (Logika), dan Chessboard.js (UI) via CDN -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        let board = null;
        let game = new Chess();
        const $status = $('#status');

        function onDragStart(source, piece, position, orientation) {
            // Jangan izinkan gerakkan bidak jika game selesai
            if (game.game_over()) return false;

            // Pemain hanya boleh menggerakkan bidak Putih ('w')
            if (piece.search(/^b/) !== -1) return false;
        }

        function makeBotMove() {
            const possibleMoves = game.moves();

            // Game over jika tidak ada langkah tersisa
            if (possibleMoves.length === 0) return;

            // Strategi Bot: Memilih langkah acak (Random Bot)
            const randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            
            // Update papan visual
            board.position(game.fen());
            updateStatus();
        }

        function onDrop(source, target) {
            // Cek apakah langkah legal
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Otomatis promosi ke Ratu jika sampai ujung
            });

            // Jika langkah ilegal, kembalikan bidak
            if (move === null) return 'snapback';

            updateStatus();

            // Berikan giliran ke Bot setelah jeda 500ms
            if (!game.game_over()) {
                $status.html('Bot sedang berpikir...');
                window.setTimeout(makeBotMove, 500);
            }
        }

        // Update animasi posisi papan setelah drop selesai
        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            let statusText = '';

            if (game.in_checkmate()) {
                statusText = game.turn() === 'd' ? 'Game Over: Bot Menang (Skakmat)!' : 'Game Over: Anda Menang (Skakmat)!';
            } else if (game.in_draw()) {
                statusText = 'Game Over: Seri (Draw)!';
            } else {
                statusText = game.turn() === 'w' ? 'Giliran Anda (Putih)' : 'Giliran Bot (Hitam)';
                if (game.in_check()) {
                    statusText += ' - SKAK!';
                }
            }

            $status.html(statusText);
        }

        // Konfigurasi awal papan catur
        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('myBoard', config);
        updateStatus();

        function resetGame() {
            game.clear();
            game.reset();
            board.start();
            updateStatus();
        }
    </script>
</body>
</html>
