<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Ular Tangga Klasik</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f0e6d2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #8b0000;
            text-shadow: 2px 2px #ccc;
            margin-bottom: 10px;
        }
        #game-container {
            display: flex;
            gap: 20px;
            background: #fff8dc;
            padding: 20px;
            border: 4px solid #8b0000;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        canvas {
            border: 3px solid #5c4033;
            background-color: #fff;
        }
        #controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 200px;
            background: #faebd7;
            border: 2px dashed #8b0000;
            padding: 15px;
            border-radius: 8px;
        }
        .btn {
            background-color: #8b0000;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px #5c4033;
            margin-bottom: 15px;
            width: 100%;
        }
        .btn:active {
            box-shadow: 0 1px #5c4033;
            transform: translateY(3px);
        }
        .btn:disabled {
            background-color: #cccccc;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        #dice-view {
            font-size: 48px;
            margin: 10px 0;
            height: 60px;
        }
        #status {
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>🐍 ULAR TANGGA KLASIK 🪜</h1>
    
    <div id="game-container">
        <canvas id="board" width="500" height="500"></canvas>
        
        <div id="controls">
            <div id="status">Giliran Anda!<br>Silahkan kocok dadu.</div>
            <div id="dice-view">🎲</div>
            <button id="dice-btn" class="btn" onclick="playTurn()">KOCOK DADU</button>
            <button class="btn" style="background-color: #5c4033;" onclick="resetGame()">RESET</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const diceBtn = document.getElementById('dice-btn');
        const diceView = document.getElementById('dice-view');
        const statusTxt = document.getElementById('status');

        const size = 10; // 10x10 kotak
        const cellSize = canvas.width / size;

        // Posisi Pemain (1-100). 0 berarti belum mulai di papan.
        let playerPos = 0;
        let botPos = 0;
        let isPlayerTurn = true;
        let gameOver = false;

        // Dadu visual (Unicode)
        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        // Definisi Tangga (kunci: mulai, nilai: tujuan)
        const ladders = {
            3: 21, 8: 30, 28: 84, 58: 77, 75: 86, 80: 99
        };

        // Definisi Ular (kunci: mulai, nilai: tujuan)
        const snakes = {
            17: 13, 52: 29, 57: 40, 62: 22, 88: 18, 95: 51, 97: 79
        };

        // Konversi nomor kotak (1-100) ke koordinat X dan Y (pixel)
        function getCoordinates(pos) {
            if (pos === 0) return { x: -20, y: canvas.height - 20 }; // Diluar papan sebelum mulai
            
            let zeroBased = pos - 1;
            let row = Math.floor(zeroBased / 10);
            let col = zeroBased % 10;

            // Baris ganjil jalannya zigzag (dari kanan ke kiri)
            if (row % 2 === 1) {
                col = 9 - col;
            }

            let x = col * cellSize + cellSize / 2;
            let y = canvas.height - (row * cellSize + cellSize / 2);
            return { x, y };
        }

        // Gambar Papan Permainan
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Gambar Kotak Warna-Warni Klasik
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    let col = c;
                    if (r % 2 === 1) col = 9 - c;
                    let boxNum = r * 10 + col + 1;

                    // Warna selang-seling krem tua dan muda
                    ctx.fillStyle = (r + c) % 2 === 0 ? '#ffebcd' : '#d2b48c';
                    ctx.fillRect(c * cellSize, canvas.height - (r + 1) * cellSize, cellSize, cellSize);

                    // Garis tepi kotak
                    ctx.strokeStyle = '#5c4033';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(c * cellSize, canvas.height - (r + 1) * cellSize, cellSize, cellSize);

                    // Nomor kotak
                    ctx.fillStyle = '#5c4033';
                    ctx.font = '12px Courier New';
                    ctx.fillText(boxNum, c * cellSize + 5, canvas.height - (r * cellSize) - 5);
                }
            }

            // 2. Gambar Tangga (Warna Hijau Klasik)
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#228b22';
            for (let start in ladders) {
                let p1 = getCoordinates(parseInt(start));
                let p2 = getCoordinates(ladders[start]);
                
                // Tiang tangga kiri & kanan
                ctx.beginPath();
                ctx.moveTo(p1.x - 5, p1.y); ctx.lineTo(p2.x - 5, p2.y);
                ctx.moveTo(p1.x + 5, p1.y); ctx.lineTo(p2.x + 5, p2.y);
                ctx.stroke();

                // Anak tangga
                ctx.lineWidth = 2;
                for (let i = 0.2; i < 1; i += 0.2) {
                    let rx = p1.x + (p2.x - p1.x) * i;
                    let ry = p1.y + (p2.y - p1.y) * i;
                    ctx.beginPath();
                    ctx.moveTo(rx - 8, ry); ctx.lineTo(rx + 8, ry);
                    ctx.stroke();
                }
                ctx.lineWidth = 4;
            }

            // 3. Gambar Ular (Warna Merah)
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#ff4500';
            for (let start in snakes) {
                let p1 = getCoordinates(parseInt(start)); // Kepala
                let p2 = getCoordinates(snakes[start]); // Ekor

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                // Membuat efek liukan ular menggunakan quadratic curve
                let cx = (p1.x + p2.x) / 2 + 30;
                let cy = (p1.y + p2.y) / 2 - 20;
                ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);
                ctx.stroke();

                // Gambar lingkaran kecil penanda kepala ular
                ctx.fillStyle = '#8b0000';
                ctx.beginPath();
                ctx.arc(p1.x, p1.y, 6, 0, 2 * Math.PI);
                ctx.fill();
            }

            // 4. Gambar Pion Pemain (Biru) & Bot (Merah Tua)
            let pCoord = getCoordinates(playerPos);
            let bCoord = getCoordinates(botPos);

            // Jika berada di kotak yang sama, geser sedikit agar tidak bertumpukan total
            if (playerPos === botPos && playerPos !== 0) {
                pCoord.x -= 8;
                bCoord.x += 8;
            }

            // Pion User
            if(playerPos >= 0) {
                ctx.fillStyle = '#0000ff';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(pCoord.x, pCoord.y, 10, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
            }

            // Pion Bot
            if(botPos >= 0) {
                ctx.fillStyle = '#ff0000';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(bCoord.x, bCoord.y, 10, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
            }
        }

        // Fungsi Logika Giliran Bermain
        function playTurn() {
            if (gameOver || !isPlayerTurn) return;

            diceBtn.disabled = true;
            let roll = Math.floor(Math.random() * 6) + 1;
            diceView.innerText = diceFaces[roll - 1];

            // Update posisi user
            playerPos = movePlayer(playerPos, roll, "Anda");
            drawBoard();

            if (playerPos === 100) {
                statusTxt.innerHTML = "🎉 Selamat! <br>Anda Menang!";
                gameOver = true;
                return;
            }

            // Giliran BOT setelah 1.5 detik
            isPlayerTurn = false;
            statusTxt.innerHTML = `Anda dapat ${roll}.<br>Giliran Bot bergerak...`;

            setTimeout(botTurn, 1500);
        }

        function botTurn() {
            if (gameOver) return;

            let roll = Math.floor(Math.random() * 6) + 1;
            diceView.innerText = diceFaces[roll - 1];

            botPos = movePlayer(botPos, roll, "Bot");
            drawBoard();

            if (botPos === 100) {
                statusTxt.innerHTML = "🤖 Bot Menang! <br>Jangan menyerah.";
                gameOver = true;
                return;
            }

            isPlayerTurn = true;
            diceBtn.disabled = false;
            statusTxt.innerHTML = `Bot dapat ${roll}.<br>Giliran Anda!`;
        }

        // Hitung pergerakan posisi termasuk ular dan tangga
        function movePlayer(currentPos, roll, name) {
            let targetPos = currentPos + roll;

            // Jika lewat dari 100, posisi memantul kembali
            if (targetPos > 100) {
                let over = targetPos - 100;
                targetPos = 100 - over;
            }

            // Cek Tangga
            if (ladders[targetPos]) {
                statusTxt.innerHTML += `<br>🪜 Hore! ${name} naik tangga ke ${ladders[targetPos]}`;
                targetPos = ladders[targetPos];
            } 
            // Cek Ular
            else if (snakes[targetPos]) {
                statusTxt.innerHTML += `<br>🐍 Oops! ${name} digigit ular turun ke ${snakes[targetPos]}`;
                targetPos = snakes[targetPos];
            }

            return targetPos;
        }

        // Reset Game ke Awal
        function resetGame() {
            playerPos = 0;
            botPos = 0;
            isPlayerTurn = true;
            gameOver = false;
            diceBtn.disabled = false;
            diceView.innerText = '🎲';
            statusTxt.innerHTML = "Game Direset.<br>Giliran Anda!";
            drawBoard();
        }

        // Inisialisasi papan saat pertama kali dibuka
        drawBoard();
    </script>
</body>
</html>
