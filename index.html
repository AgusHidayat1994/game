<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly 3D VS Bot</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: none; }
        button { pointer-events: auto; padding: 8px 12px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
    <!-- Memuat Three.js untuk Grafis 3D -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="ui">
        <h2>Monopoly 3D Mini</h2>
        <div id="status">Giliran: Pemain 1 (Anda)</div>
        <div id="info">Posisi P1: Petak 0 | Posisi Bot: Petak 0</div>
        <button id="roll-btn" onclick="jalankanGiliranPemain()">Kocok Dadu</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. SETUP ENGINE 3D (THREE.JS) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202026);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Pencahayaan
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 10, 7);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 2. MEMBUAT PAPAN MONOPOLY 3D ---
        // Membuat papan dasar kotak besar
        const boardGeometry = new THREE.BoxGeometry(10, 0.2, 10);
        const boardMaterial = new THREE.MeshStandardMaterial({ color: 0xcce6ff });
        const board = new THREE.Mesh(boardGeometry, boardMaterial);
        scene.add(board);

        // Koordinat 4 sudut petak utama (Sederhana: 4 petak saja untuk contoh tracker lintasan)
        // Petak 0 (Mulai), Petak 1 (Kiri Atas), Petak 2 (Kanan Atas), Petak 3 (Kanan Bawah)
        const koordinatPetak = [
            new THREE.Vector3(-4, 0.3, 4),  // Petak 0 (Start)
            new THREE.Vector3(-4, 0.3, -4), // Petak 1
            new THREE.Vector3(4, 0.3, -4),  // Petak 2
            new THREE.Vector3(4, 0.3, 4)    // Petak 3
        ];

        // Visualisasi petak di papan
        koordinatPetak.forEach((pos, index) => {
            const tileGeo = new THREE.BoxGeometry(1.5, 0.22, 1.5);
            const tileMat = new THREE.MeshStandardMaterial({ color: index === 0 ? 0xff4d4d : 0xffffff });
            const tile = new THREE.Mesh(tileGeo, tileMat);
            tile.position.copy(pos);
            scene.add(tile);
        });

        // --- 3. MEMBUAT BIDAK PEMAIN (3D) ---
        // Bidak Pemain 1 (Bola Merah)
        const p1Geo = new THREE.SphereGeometry(0.4, 32, 32);
        const p1Mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const bidakP1 = new THREE.Mesh(p1Geo, p1Mat);
        scene.add(bidakP1);

        // Bidak Bot/Pemain 2 (Bola Biru)
        const botGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const botMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const bidakBot = new THREE.Mesh(botGeo, botMat);
        scene.add(bidakBot);

        // --- 4. LOGIKA GAME & BOT ---
        let statusGame = {
            posisiP1: 0,
            posisiBot: 0,
            giliranPemain: true // true = P1, false = Bot
        };

        function updatePosisiBidak() {
            // Update posisi 3D berdasarkan koordinat petak
            bidakP1.position.copy(koordinatPetak[statusGame.posisiP1]);
            // Beri sedikit offset koordinat X agar bidak bot tidak menumpuk persis di tengah bidak P1
            bidakBot.position.copy(koordinatPetak[statusGame.posisiBot]).add(new THREE.Vector3(0.5, 0, 0));
            
            document.getElementById('info').innerText = `Posisi P1: Petak ${statusGame.posisiP1} | Posisi Bot: Petak ${statusGame.posisiBot}`;
        }

        // Inisialisasi awal posisi
        updatePosisiBidak();

        function kocokDadu() {
            return Math.floor(Math.random() * 3) + 1; // Dadu mini: angka 1 sampai 3
        }

        function jalankanGiliranPemain() {
            if (!statusGame.giliranPemain) return; // Kunci tombol jika giliran bot

            const angkaDadu = kocokDadu();
            statusGame.posisiP1 = (statusGame.posisiP1 + angkaDadu) % koordinatPetak.length;
            updatePosisiBidak();
            
            document.getElementById('status').innerText = `Pemain 1 maju ${angkaDadu} langkah.`;
            document.getElementById('roll-btn').disabled = true;

            // Alihkan giliran ke Bot setelah 1.5 detik
            statusGame.giliranPemain = false;
            setTimeout(jalankanGiliranBot, 1500);
        }

        // --- KECERDASAN BUATAN (BOT AI) ---
        function jalankanGiliranBot() {
            document.getElementById('status').innerText = `Bot sedang berpikir...`;
            
            setTimeout(() => {
                const angkaDadu = kocokDadu();
                statusGame.posisiBot = (statusGame.posisiBot + angkaDadu) % koordinatPetak.length;
                updatePosisiBidak();
                
                document.getElementById('status').innerText = `Bot (P2) maju ${angkaDadu} langkah. Giliran Anda!`;
                
                // Kembalikan giliran ke pemain asli
                statusGame.giliranPemain = true;
                document.getElementById('roll-btn').disabled = false;
            }, 1200); // Simulasi delay bot berpikir
        }

        // --- 5. GAME LOOP ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Animasi rotasi papan pelan agar efek 3D terasa nyata
            board.rotation.y += 0.002;
            koordinatPetak.forEach((pos, index) => {
                // Ikut memutar posisi logika pelat agar bidak menempel sempurna
                // (Untuk kesederhanaan prototipe ini, kamera diputar statis saja jika ingin dikembangkan lebih lanjut)
            });

            renderer.render(scene, camera);
        }
        animate();

        // Menyesuaikan ukuran layar otomatis
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize(){
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
